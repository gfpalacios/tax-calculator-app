services:
  backend:
    image: node:22.9.0
    command: sh -c "npm install --verbose && npm run build && npm run start"
    working_dir: /app
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - NODE_ENV=development
      - TAX_API_URL=http://tax-api:5001
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - tax-app-network
    depends_on:
      - tax-api
    restart: always

  tax-api:
    image: ptsdocker16/interview-test-server
    init: true
    ports:
      - "5001:5001"
    networks:
      - tax-app-network
    restart: always

  frontend:
    image: node:22.9.0
    command: sh -c "npm install --verbose && npm run build && npm run preview"
    working_dir: /app
    ports:
      - "4173:4173"
    environment:
      - VITE_API_URL=http://backend:3001
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - tax-app-network
    restart: always

networks:
  tax-app-network:
    name: tax-app-network
    driver: bridge
    driver_opts:
      com.docker.network.driver.mtu: 1400
